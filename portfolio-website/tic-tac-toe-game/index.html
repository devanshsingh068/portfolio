<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="navbar">
        <div class="logo"></div>
        <div>
            <li>TicTacToe.com</li>
        </div>
        <div class="rightitems">
            <div class="home">
         <a href=""></a> HOME </div>
         <div class="about">
            <a href=""></a> ABOUT 
        </div>
</div>
    </div>
</div>

<div class="gamecontainer">
    <div class="container">
        <button class="box bt-0 bl-0"><span class="boxtext"></span></button>
        <button class="box bt-0"><span class="boxtext"></span></button>
        <button class="box bt-0 br-0"><span class="boxtext"></span></button>
        <button class="box bl-0"><span class="boxtext"></span></button>
        <button class="box"><span class="boxtext"></span></button>
        <button class="box br-0"><span class="boxtext"></span></button>
        <button class="box bl-0 bb-0"><span class="boxtext"></span></button>
        <button class="box bb-0"><span class="boxtext"></span></button>
        <button class="box bb-0 br-0"><span class="boxtext"></span></button>
        <div class="line"></div>
             
    </div>
    <div class="gameInfo">
        <h1>Welcome To Tic Tac Toe</h1>
        <div>
            <span class="Info">Turn For X</span>
            <button id="reset">Reset</button>
        </div>
        <div class="imgbox">
            <img src="sticker.png" alt="">
        </div>
    </div>
</div>
<script src="script.js"></script>
    
</body>
</html>
